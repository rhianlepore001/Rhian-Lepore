<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgendiX — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chivo:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;background:#131316}

:root{
  --font-display:'Chivo',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}

[data-theme="barber-dark"]{
  --bg:#121212;--card:#1E1E1E;--text-primary:#EAEAEA;--text-secondary:#A8A8A0;
  --accent:#C29B40;--accent-hover:#D4AE52;--accent-foreground:#121212;--accent-subtle:rgba(194,155,64,0.10);
  --input-bg:#2A2A2A;--input-border:#404040;--input-focus:rgba(194,155,64,0.45);
  --border:#333;--hover-overlay:rgba(255,255,255,0.04);
  --shadow:0 1px 3px rgba(0,0,0,0.4);
  --radius-card:8px;--radius-button:8px;--radius-input:6px;--radius-segment:8px;
  --py:24px;--px:24px;--card-py:32px;--card-px:28px;--gap:16px;--field-gap:8px;--input-h:40px;--segment-py:10px;
}
[data-theme="barber-light"]{
  --bg:#F5F1E8;--card:#FFFFFF;--text-primary:#1A1A1A;--text-secondary:#6B6B5E;
  --accent:#A07A2A;--accent-hover:#B8902E;--accent-foreground:#000000;--accent-subtle:rgba(160,122,42,0.08);
  --input-bg:#FFFFFF;--input-border:#D4D0C6;--input-focus:rgba(160,122,42,0.40);
  --border:#E5E1D6;--hover-overlay:rgba(0,0,0,0.03);
  --shadow:0 1px 3px rgba(0,0,0,0.07);
  --radius-card:8px;--radius-button:8px;--radius-input:6px;--radius-segment:8px;
  --py:24px;--px:24px;--card-py:32px;--card-px:28px;--gap:16px;--field-gap:8px;--input-h:40px;--segment-py:10px;
}
[data-theme="beauty-dark"]{
  --bg:#1F1B2E;--card:#2E2B3B;--text-primary:#EAEAEA;--text-secondary:#B0AAC0;
  --accent:#A78BFA;--accent-hover:#B9A0FB;--accent-foreground:#1F1B2E;--accent-subtle:rgba(167,139,250,0.10);
  --input-bg:#3A3650;--input-border:#4E4A64;--input-focus:rgba(167,139,250,0.40);
  --border:#443F5A;--hover-overlay:rgba(255,255,255,0.04);
  --shadow:0 2px 8px rgba(0,0,0,0.3);
  --radius-card:16px;--radius-button:12px;--radius-input:8px;--radius-segment:16px;
  --py:32px;--px:28px;--card-py:40px;--card-px:36px;--gap:20px;--field-gap:12px;--input-h:44px;--segment-py:14px;
}
[data-theme="beauty-light"]{
  --bg:#F7F5FF;--card:#FFFFFF;--text-primary:#1A1A1A;--text-secondary:#6B6580;
  --accent:#7C3AED;--accent-hover:#8B49F0;--accent-foreground:#FFFFFF;--accent-subtle:rgba(124,58,237,0.08);
  --input-bg:#FFFFFF;--input-border:#DDD8F0;--input-focus:rgba(124,58,237,0.40);
  --border:#E5E0F5;--hover-overlay:rgba(0,0,0,0.03);
  --shadow:0 2px 8px rgba(0,0,0,0.06);
  --radius-card:16px;--radius-button:12px;--radius-input:8px;--radius-segment:16px;
  --py:32px;--px:28px;--card-py:40px;--card-px:36px;--gap:20px;--field-gap:12px;--input-h:44px;--segment-py:14px;
}

.theme-nav{
  position:sticky;top:0;z-index:10;
  display:flex;gap:4px;padding:12px 16px;
  background:var(--nav-bg,#111);border-bottom:1px solid rgba(255,255,255,0.08);
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.theme-nav::-webkit-scrollbar{display:none}
.theme-nav-btn{
  font-family:var(--font-mono);font-size:12px;font-weight:500;
  letter-spacing:0.02em;
  padding:8px 14px;border:1px solid rgba(255,255,255,0.12);border-radius:6px;
  background:transparent;color:rgba(255,255,255,0.55);cursor:pointer;
  white-space:nowrap;
  transition:all 180ms ease-out;
}
.theme-nav-btn:hover{color:rgba(255,255,255,0.85);border-color:rgba(255,255,255,0.25)}
.theme-nav-btn:focus-visible{outline:2px solid #e0e0e0;outline-offset:2px}
.theme-nav-btn.active{color:#fff;border-color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.08)}
.theme-nav-btn[data-theme="barber-dark"].active{border-color:#C29B40;color:#C29B40}
.theme-nav-btn[data-theme="barber-light"].active{border-color:#A07A2A;color:#A07A2A;background:rgba(160,122,42,0.12)}
.theme-nav-btn[data-theme="beauty-dark"].active{border-color:#A78BFA;color:#A78BFA}
.theme-nav-btn[data-theme="beauty-light"].active{border-color:#7C3AED;color:#7C3AED;background:rgba(124,58,237,0.12)}

.matrix-grid{
  display:grid;
  grid-template-columns:1fr;
  min-height:calc(100dvh - 57px);
}

.panel{
  display:none;
  background:var(--bg);
  min-height:100dvh;
  padding:var(--py) var(--px);
  transition:background 200ms ease-out;
}
.panel.active{display:flex;flex-direction:column;align-items:center;justify-content:center}

.panel-label{
  font-family:var(--font-mono);font-size:11px;font-weight:500;
  letter-spacing:0.04em;text-transform:none;
  color:var(--text-secondary);opacity:0.5;
  margin-bottom:8px;text-align:center;
  position:absolute;top:var(--py);left:50%;transform:translateX(-50%);
}

.login-viewport{
  width:100%;max-width:420px;
  display:flex;flex-direction:column;align-items:center;
}

.login-card{
  width:100%;
  background:var(--card);
  border-radius:var(--radius-card);
  padding:var(--card-py) var(--card-px);
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  transition:box-shadow 200ms ease-out;
}

.login-logo{
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-bottom:6px;
}
.logo-mark{
  width:36px;height:36px;border-radius:var(--radius-input);
  background:var(--accent);color:var(--accent-foreground);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:18px;font-weight:700;
  line-height:1;
}
.logo-text{
  font-family:var(--font-display);font-size:22px;font-weight:700;
  color:var(--text-primary);letter-spacing:-0.01em;line-height:1;
}

.login-heading{
  font-family:var(--font-display);font-size:18px;font-weight:600;
  color:var(--text-primary);text-align:center;
  margin-top:4px;margin-bottom:var(--gap);
  letter-spacing:-0.01em;
}

.segment-selector{
  display:grid;grid-template-columns:1fr 1fr;
  gap:var(--field-gap);
  margin-bottom:var(--gap);
}

.segment-card{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:var(--segment-py) 12px;
  border:2px solid var(--border);border-radius:var(--radius-segment);
  background:transparent;color:var(--text-secondary);
  font-family:var(--font-body);font-size:14px;font-weight:500;
  cursor:pointer;
  transition:all 180ms ease-out;
}
.segment-card:hover{background:var(--hover-overlay);color:var(--text-primary)}
.segment-card.selected{
  border-color:var(--accent);
  background:var(--accent-subtle);
  color:var(--text-primary);
}
.segment-card:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

.segment-icon{width:18px;height:18px;flex-shrink:0;color:currentColor}

.login-form{
  display:flex;flex-direction:column;gap:var(--field-gap);
}

.field{display:flex;flex-direction:column;gap:4px}
.field-label{
  font-family:var(--font-body);font-size:14px;font-weight:500;
  color:var(--text-primary);
  letter-spacing:0;
  text-transform:none;
}
.field-input-wrap{position:relative}
.field-input{
  width:100%;height:var(--input-h);
  padding:0 14px;
  background:var(--input-bg);
  border:1px solid var(--input-border);
  border-radius:var(--radius-input);
  color:var(--text-primary);
  font-family:var(--font-body);font-size:14px;
  transition:border-color 180ms ease-out,box-shadow 180ms ease-out;
  outline:none;
}
.field-input::placeholder{color:var(--text-secondary);opacity:0.7}
.field-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--input-focus)}
.field-input-password{padding-right:42px}

.toggle-password{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text-secondary);
  cursor:pointer;padding:4px;
  transition:color 180ms ease-out;
}
.toggle-password:hover{color:var(--text-primary)}
.toggle-password:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
.toggle-password svg{width:20px;height:20px;display:block}

.btn-primary{
  width:100%;margin-top:calc(var(--field-gap)/2);
  height:var(--input-h);min-height:var(--input-h);
  border:none;border-radius:var(--radius-button);
  background:var(--accent);color:var(--accent-foreground);
  font-family:var(--font-body);font-size:15px;font-weight:600;
  cursor:pointer;
  transition:background 180ms ease-out,transform 100ms ease-out;
}
.btn-primary:hover{background:var(--accent-hover)}
.btn-primary:active{transform:scale(0.98)}
.btn-primary:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

.login-links{
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:var(--gap);
}
.login-link{
  font-family:var(--font-body);font-size:13px;font-weight:500;
  color:var(--text-secondary);
  text-decoration:none;
  transition:color 180ms ease-out;
  letter-spacing:0;text-transform:none;
}
.login-link:hover{color:var(--accent)}
.login-link:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
.link-separator{
  font-family:var(--font-mono);font-size:11px;
  color:var(--text-secondary);opacity:0.4;
}

@media(min-width:768px){
  .theme-nav{
    gap:6px;padding:14px 24px;
    background:rgba(15,15,15,0.95);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    justify-content:center;
  }
  .theme-nav-btn{font-size:13px;padding:9px 18px}
  .matrix-grid{
    grid-template-columns:1fr 1fr;
    min-height:calc(100dvh - 58px);
  }
  .panel{
    display:flex!important;
    min-height:auto;
    position:relative;
    padding:var(--py) var(--px);
    border-right:1px solid rgba(128,128,128,0.08);
    border-bottom:1px solid rgba(128,128,128,0.08);
  }
  .panel:nth-child(2n){border-right:none}
  .panel:nth-child(n+3){border-bottom:none}
  .panel-label{
    position:relative;top:auto;left:auto;transform:none;
    margin-bottom:12px;
  }
}
@media(min-width:1100px){
  .login-viewport{max-width:440px}
}
@media(min-width:1440px){
  .login-viewport{max-width:460px}
  .login-card{padding:var(--card-py) var(--card-px)}
}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{
    transition-duration:0.01ms!important;
    animation-duration:0.01ms!important;
  }
}
</style>
</head>

            <svg class="segment-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.4 5.6L19 10l-5.6 1.4L12 17l-1.4-5.6L5 10l5.6-1.4z"/><path d="M19 15l.5 2 2 .5-2 .5-.5 2-.5-2-2-.5z"/></svg>
            <span>Salão</span>
          </button>
        </div>

        <form class="login-form" onsubmit="return false" autocomplete="off">
          <div class="field">
            <label class="field-label" for="email-bl2">E-mail</label>
            <input class="field-input" type="email" id="email-bl2" placeholder="seu@email.com" autocomplete="email">
          </div>
          <div class="field">
            <label class="field-label" for="pass-bl2">Senha</label>
            <div class="field-input-wrap">
              <input class="field-input field-input-password" type="password" id="pass-bl2" placeholder="••••••••" autocomplete="current-password">
              <button type="button" class="toggle-password" aria-label="Mostrar senha" data-target="pass-bl2">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <button type="submit" class="btn-primary">Entrar</button>
        </form>

        <div class="login-links">
          <a href="#" class="login-link">Criar conta</a>
          <span class="link-separator">·</span>
          <a href="#" class="login-link">Esqueci a senha</a>
        </div>
      </div>
    </div>
  </section>

</main>

<script>
(function(){
  var nav=document.getElementById('themeNav');
  var grid=document.getElementById('matrixGrid');
  var isMobile=function(){return window.innerWidth<768};

  function showPanel(id){
    var panels=grid.querySelectorAll('.panel');
    panels.forEach(function(p){p.classList.remove('active')});
    var target=document.getElementById(id);
    if(target)target.classList.add('active');
    var btns=nav.querySelectorAll('.theme-nav-btn');
    btns.forEach(function(b){b.classList.remove('active')});
    var activeBtn=nav.querySelector('[data-target="'+id+'"]');
    if(activeBtn)activeBtn.classList.add('active');
  }

  nav.addEventListener('click',function(e){
    var btn=e.target.closest('.theme-nav-btn');
    if(!btn)return;
    var target=btn.getAttribute('data-target');
    if(!target)return;
    showPanel(target);
    if(isMobile()){
      var panel=document.getElementById(target);
      if(panel)panel.scrollIntoView({behavior:'smooth',block:'start'});
    }
  });

  function syncNav(){
    if(!isMobile()){
      var panels=grid.querySelectorAll('.panel');
      panels.forEach(function(p){p.classList.add('active')});
      var btns=nav.querySelectorAll('.theme-nav-btn');
      btns.forEach(function(b){b.classList.remove('active')});
      btns[0].classList.add('active');
    }
  }

  window.addEventListener('resize',syncNav);
  syncNav();

  grid.addEventListener('click',function(e){
    var card=e.target.closest('.segment-card');
    if(!card)return;
    var selector=card.closest('.segment-selector');
    if(!selector)return;
    selector.querySelectorAll('.segment-card').forEach(function(c){
      c.classList.remove('selected');
      c.setAttribute('aria-checked','false');
    });
    card.classList.add('selected');
    card.setAttribute('aria-checked','true');
  });

  grid.addEventListener('click',function(e){
    var btn=e.target.closest('.toggle-password');
    if(!btn)return;
    var inputId=btn.getAttribute('data-target');
    var input=document.getElementById(inputId);
    if(!input)return;
    var isPassword=input.type==='password';
    input.type=isPassword?'text':'password';
    btn.setAttribute('aria-label',isPassword?'Ocultar senha':'Mostrar senha');
    if(isPassword){
      btn.innerHTML='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/></svg>';
    }else{
      btn.innerHTML='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    }
  });
})();
</script>
</body>
</html>
