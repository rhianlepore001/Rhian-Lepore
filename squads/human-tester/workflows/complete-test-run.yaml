workflow:
  id: complete-test-run
  name: "Ciclo Completo de Testes Humanos"
  description: >
    Orquestra os 5 agentes testadores em sequência lógica:
    explorar → destruir → inspecionar → estressar → proteger.
  version: "1.0.0"

  trigger: manual
  elicit: true
  tool: playwright

  pre_requisites:
    - "Dev server running: npm run dev (localhost:3000)"
    - "Playwright MCP available"
    - "Test data in database (or test empty states)"

  phases:
    - id: explore
      name: "Happy Path"
      agent: explorer
      task: explore-flow
      output: exploration_report
      description: "Navi navega como primeiro uso — tudo funciona?"

    - id: destroy
      name: "Testes Negativos"
      agent: destroyer
      task: break-flow
      depends_on: [explore]
      output: bugs_report
      description: "Havoc tenta quebrar — o que sobrevive?"

    - id: inspect
      name: "Inspeção Visual"
      agent: meticulous
      task: inspect-flow
      depends_on: [explore]
      output: visual_report
      description: "Pixel inspeciona cada detalhe visual"

    - id: stress
      name: "Performance & Stress"
      agent: speedster
      task: stress-flow
      depends_on: [explore]
      output: performance_report
      description: "Flash testa velocidade e resiliência"

    - id: guard
      name: "Segurança & Dados"
      agent: guardian
      task: guard-flow
      depends_on: [explore]
      output: security_report
      description: "Shield verifica segurança e isolamento"

  parallel_groups:
    - description: "Após exploração, estes rodam em paralelo"
      agents: [destroyer, meticulous, speedster, guardian]
      depends_on: explore

  output:
    type: comprehensive_test_report
    includes:
      - exploration_report
      - bugs_report
      - visual_report
      - performance_report
      - security_report
    format: markdown
    save_to: "docs/test-reports/"
