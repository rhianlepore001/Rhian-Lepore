  - mark_commissions_as_paid: Added validation that professional is owned by user
  - get_finance_stats, get_dashboard_stats, get_schedule: Similar validation audited
  - All 5 RPCs have validation block at entry
  - Migration SQL with updated function definitions

scope:
  files_affected:
    - supabase/migrations/[next]_validate_rpc_ownership.sql
  test_coverage: >
    Unit test: Call get_available_slots with professional_id from OTHER business,
    verify rejection with "Unauthorized" error.

estimation:
  t_shirt: S
  hours: 3
  complexity: 2

dependencies:
  blocks: []
  blocked_by: [ US-026 ]

success_metric: >
  All 5 identified RPCs reject cross-tenant parameter values. Error message
