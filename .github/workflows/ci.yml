name: CI

on:
  push:
    branches: [main, develop, ux-teste]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, Typecheck & Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test -- --run

      - name: Coverage report
        run: npm run test:coverage
