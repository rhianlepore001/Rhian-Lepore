name: "Squad AI & Features"
version: "0.1.0"
description: "Time responsável por integração Google Gemini, Finance Doctor e features IA avançadas"
author: "Beauty OS Team"
license: "MIT"

aios:
  minVersion: "2.1.0"
  type: "squad"

lead_agent: "backend-specialist"

members:
  - agent: "backend-specialist"
    role: "Tech Lead"
    focus: "API integration, system architecture"

  - agent: "claude-developer-platform"
    role: "Claude API Lead"
    focus: "Claude SDK integration, Agent patterns"
    note: "Secondary support for advanced AI features"

  - agent: "debugger"
    role: "Debugging & Optimization"
    focus: "Performance tuning, API optimization"

  - agent: "documentation-writer"
    role: "Documentation"
    focus: "API documentation, usage guides"

components:
  agents:
    - ./agents/*.yaml
  tasks:
    - ./tasks/*.yaml
  workflows:
    - ./workflows/*.yaml

responsibilities:
  - "Integração com Google Generative AI (Gemini)"
  - "Desenvolvimento do Finance Doctor module"
  - "Análises financeiras e recomendações"
  - "Otimização de prompts e modelos"
  - "Error handling e fallbacks"
  - "Logging e monitoring de IA calls"
  - "Testes de features IA"
  - "Segurança de API keys"

active_features:
  - name: "Finance Doctor"
    status: "in_progress"
    story: "US-004"
    phase: "1"
    description: "Análise inteligente de transações financeiras com recomendações"

  - name: "AIOS Integration"
    status: "in_progress"
    story: "US-005"
    phase: "1"
    description: "Integração com AIOS framework para orquestração de agentes"

planned_features:
  - name: "Gemini v2 Upgrade"
    story: "US-013"
    quarter: "Q3 2026"
    description: "Upgrade para Gemini 2.0 com melhor performance"

  - name: "Multi-model Support"
    story: "US-014"
    quarter: "Q4 2026"
    description: "Suporte a múltiplos modelos (GPT-4, Claude 4, etc.)"

  - name: "Fine-tuning Models"
    story: "US-015"
    quarter: "Q1 2027"
    description: "Fine-tuning de modelos para domínio beauty/barbershop"

technology_stack:
  - name: "Google Generative AI (Gemini)"
    version: "latest"
  - name: "Claude API"
    version: "latest"
  - name: "Agent SDK"
    version: "latest"
  - name: "Node.js"
    version: "18+"
  - name: "TypeScript"
    version: "5.8"
  - name: "Vitest"
    version: "latest"

directories:
  - path: "lib/gemini.ts"
    description: "Google Generative AI client"
  - path: "pages/finance/"
    description: "Finance Doctor pages"
  - path: "utils/ai/"
    description: "AI utilities and helpers"
  - path: "test/ai/"
    description: "AI feature tests"

environment_variables:
  - name: "GEMINI_API_KEY"
    required: true
    visibility: "frontend-safe"
    description: "Google Gemini API key"

  - name: "CLAUDE_API_KEY"
    required: false
    visibility: "backend-only"
    description: "Claude API key for advanced features"

metrics:
  - name: "AI Model Accuracy"
    target: "90%"
    unit: "percent"

  - name: "API Response Time"
    target: "2000"
    unit: "milliseconds"

  - name: "Feature Coverage"
    target: "95%"
    unit: "percent"

  - name: "Error Rate"
    target: "< 1%"
    unit: "percent"

critical_rules:
  - "Never hardcode API keys - always use environment variables"
  - "Implement fallback logic for API failures"
  - "Log all AI API calls for audit trail"
  - "Validate prompt injection vectors"
  - "Cache responses when appropriate"
  - "Monitor API usage and costs"
  - "Test with multiple model versions"

api_security:
  - "All API requests must be authenticated"
  - "Rate limiting on API endpoints"
  - "Request validation before sending to external APIs"
  - "Response sanitization before rendering"
  - "Cost monitoring and limits"

testing:
  - "Unit tests for prompt engineering"
  - "Integration tests with Gemini API (staging)"
  - "Mock tests for CI/CD"
  - "Performance tests (response time)"
  - "Error scenario tests"

dependencies: []

keywords:
  - "aios"
  - "squad"
  - "ai"
  - "gemini"
  - "claude"
  - "finance-doctor"
  - "beauty-os"

tags:
  - "ai-integration"
  - "machine-learning"
  - "api-integration"
  - "llm"
  - "generative-ai"
