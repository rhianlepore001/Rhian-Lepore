name: "Squad Produto & Documentação"
version: "0.1.0"
description: "Time responsável por PRDs, ADRs, documentação técnica, roadmap e comunicação inter-squads"
author: "Beauty OS Team"
license: "MIT"

aios:
  minVersion: "2.1.0"
  type: "squad"

lead_agent: "product-manager"

members:
  - agent: "product-manager"
    role: "Product Lead"
    focus: "PRD, roadmap, feature prioritization"

  - agent: "product-owner"
    role: "Product Owner"
    focus: "Requirements, backlog grooming"

  - agent: "documentation-writer"
    role: "Documentation Lead"
    focus: "Technical documentation, API docs"

  - agent: "project-planner"
    role: "Project Planning"
    focus: "Sprint planning, timeline estimation"

components:
  agents:
    - ./agents/*.yaml
  tasks:
    - ./tasks/*.yaml
  workflows:
    - ./workflows/*.yaml

responsibilities:
  - "Product Requirements Documents (PRDs)"
  - "Architecture Decision Records (ADRs)"
  - "Roadmap planning e comunicação"
  - "Backlog grooming e priorização"
  - "Sprint planning e retrospectives"
  - "Documentação técnica"
  - "API documentation"
  - "User guides e tutorials"
  - "Release notes"
  - "Communication entre squads"
  - "Stakeholder management"

product_artifacts:
  - name: "PRD (Product Requirements Document)"
    format: ".ai/prd/{feature-slug}.md"
    template: ".aios-core/product/templates/prd.hbs"
    approval_required: true

  - name: "ADR (Architecture Decision Record)"
    format: ".ai/adr/ADR-{number}-{slug}.md"
    template: ".aios-core/product/templates/adr.hbs"
    approval_required: true

  - name: "Epic"
    format: ".ai/epics/{epic-slug}.md"
    template: ".aios-core/product/templates/epic.hbs"
    approval_required: true

  - name: "Story"
    format: ".ai/stories/US-{number}-{slug}.md"
    template: ".aios-core/product/templates/story.hbs"
    approval_required: false

  - name: "Task"
    format: ".ai/tasks/TASK-{number}-{slug}.md"
    template: ".aios-core/product/templates/task.hbs"
    approval_required: false

roadmap:
  - quarter: "Q1 2026"
    focus: "Foundation & Stabilization"
    epics:
      - US-004: "Finance Doctor (Phase 1)"
      - US-005: "AIOS Integration"
      - US-014: "2FA Implementation"
      - US-017: "E2E Test Suite"

  - quarter: "Q2 2026"
    focus: "Performance & Scaling"
    epics:
      - US-007: "Component Refactor"
      - US-008: "Dark Mode Theme"
      - US-010: "Query Optimization"
      - US-015: "DDoS Protection"
      - US-018: "Performance Optimization"
      - US-021: "API Documentation"

  - quarter: "Q3 2026"
    focus: "Advanced Features"
    epics:
      - US-009: "Mobile Optimization"
      - US-011: "Backup & Disaster Recovery"
      - US-013: "Gemini v2 Upgrade"
      - US-016: "GDPR Compliance"
      - US-019: "PWA Offline Mode"

  - quarter: "Q4 2026"
    focus: "Expansion & Optimization"
    epics:
      - US-012: "Data Replication"
      - US-020: "Knowledge Base"
      - US-022: "User Guides"

documentation_structure:
  - path: "CLAUDE.md"
    description: "Project-wide instructions (checked in repo)"

  - path: ".agent/rules/GEMINI.md"
    description: "AI behavior rules (P0 priorities)"

  - path: ".squads/SQUADS.md"
    description: "Squad organization (this file)"

  - path: ".ai/"
    description: "Product artifacts directory"
    subdirs:
      - "prd/: Product requirements"
      - "adr/: Architecture decisions"
      - "epics/: Epic descriptions"
      - "stories/: User stories"
      - "tasks/: Technical tasks"

  - path: "docs/"
    description: "Technical documentation"
    subdirs:
      - "api/: API reference"
      - "architecture/: Architecture docs"
      - "guides/: User & developer guides"
      - "tutorials/: Step-by-step tutorials"

  - path: "README.md"
    description: "Project overview"

current_active_stories:
  - id: "US-004"
    title: "Finance Doctor"
    status: "in_progress"
    phase: 1
    description: "Análise inteligente de transações financeiras com recomendações IA"

  - id: "US-005"
    title: "AIOS Integration"
    status: "in_progress"
    phase: 1
    description: "Integração com AIOS framework para orquestração de agentes"

sprint_planning:
  duration: "2 weeks"
  schedule:
    - day: "Monday 10:00"
      name: "Sprint Planning"
      duration: "1 hour"
      attendees: "All squad leads"

    - day: "Daily 09:00"
      name: "Daily Standup"
      duration: "15 minutes"
      attendees: "Squad members"

    - day: "Wednesday 14:00"
      name: "Architecture Sync"
      duration: "45 minutes"
      attendees: "All squad leads"

    - day: "Friday 11:00"
      name: "Security Review"
      duration: "30 minutes"
      attendees: "Security squad + leads"

    - day: "Friday 15:00"
      name: "Sprint Retrospective"
      duration: "45 minutes"
      attendees: "All squad members"

communication_channels:
  - name: "Pull Requests"
    purpose: "Code review, technical discussion"
    approval_rule: "2+ squad leads required"

  - name: "Issues"
    purpose: "Bug tracking, feature requests"
    labeling: "squad/, priority/, type/"

  - name: "ADRs"
    purpose: "Architecture decisions"
    location: ".ai/adr/"
    approval: "Required from affected squads"

  - name: "Slack"
    purpose: "Real-time communication"
    channels:
      - "#beauty-os-general"
      - "#squad-frontend"
      - "#squad-backend"
      - "#squad-ai"
      - "#squad-security"
      - "#squad-devops"

  - name: "Meetings"
    purpose: "Sync and planning"
    see: "sprint_planning section"

release_process:
  - step: 1
    name: "Commit & PR"
    action: "Developer creates PR with changes"

  - step: 2
    name: "Review & Testing"
    action: "Squad review + CI/CD pipeline"

  - step: 3
    name: "Merge to Staging"
    action: "PR merged to staging branch"

  - step: 4
    name: "Staging QA"
    action: "QA tests on staging environment"

  - step: 5
    name: "Approval"
    action: "Product manager approves release"

  - step: 6
    name: "Tag & Deploy"
    action: "Tag version, deploy to production"

  - step: 7
    name: "Release Notes"
    action: "Documentation writer creates release notes"

  - step: 8
    name: "Communication"
    action: "Notify users of new features"

metrics:
  - name: "Velocity (Story Points)"
    unit: "points/sprint"

  - name: "Lead Time for Features"
    target: "< 2 weeks"
    unit: "days"

  - name: "Documentation Completeness"
    target: "100%"
    unit: "percent"

  - name: "Backlog Health"
    target: "> 90%"
    unit: "percent"

  - name: "Sprint Goal Completion"
    target: "> 95%"
    unit: "percent"

critical_documents:
  - "CLAUDE.md: Read first"
  - ".agent/rules/GEMINI.md: P0 rules"
  - ".squads/SQUADS.md: Squad structure"
  - ".ai/prd/*.md: Feature requirements"
  - ".ai/adr/*.md: Tech decisions"

dependencies: []

keywords:
  - "aios"
  - "squad"
  - "product"
  - "documentation"
  - "roadmap"
  - "beauty-os"

tags:
  - "product-management"
  - "documentation"
  - "planning"
  - "communication"
