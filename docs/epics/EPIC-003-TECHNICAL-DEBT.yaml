type: Bug / Security
priority: P0
status: TODO
owner: "@data-engineer (DB implementation) / @dev (testing)"

description: >
  Five RPCs accept business/professional IDs as parameters without validating
  ownership. Attackers can supply IDs from other businesses and execute
  cross-tenant operations. Fix by adding validation blocks at RPC entry.

