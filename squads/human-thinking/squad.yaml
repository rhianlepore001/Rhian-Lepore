squad:
  id: human-thinking-v1
  name: "Human Thinking Squad"
  description: >
    Squad especializado em habilidades cognitivas humanas — pensamento crítico,
    reformulação criativa e melhoria contínua. Simula processos mentais humanos
    para analisar, questionar, reimaginar e otimizar todos os aspectos do projeto.
  version: "1.0.0"
  domain: cognitive-improvement
  created_at: "2026-03-08"
  status: active
  author: squad-creator-agent
  tags:
    - thinking
    - refactoring
    - ux-review
    - ideation
    - optimization

  agents:
    - id: thinker
      file: agents/thinker.yaml
    - id: reformulator
      file: agents/reformulator.yaml
    - id: reviewer
      file: agents/reviewer.yaml
    - id: ideator
      file: agents/ideator.yaml
    - id: optimizer
      file: agents/optimizer.yaml

  tasks:
    - id: deep-analysis
      file: tasks/deep-analysis.md
    - id: reformulate
      file: tasks/reformulate.md
    - id: ux-review
      file: tasks/ux-review.md
    - id: brainstorm
      file: tasks/brainstorm.md
    - id: optimize
      file: tasks/optimize.md
    - id: full-thinking-cycle
      file: tasks/full-thinking-cycle.md

  workflows:
    - id: thinking-cycle
      file: workflows/thinking-cycle.yaml

  checklists:
    - id: thinking-quality-gate
      file: checklists/thinking-quality-gate.md

  config:
    coding-standards: config/coding-standards.md
    tech-stack: config/tech-stack.md
