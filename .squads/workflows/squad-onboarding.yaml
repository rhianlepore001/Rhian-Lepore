name: "Squad Onboarding Workflow"
description: "Fluxo de integração de novos membros em squads AIOS"
version: "1.0.0"

triggers:
  - event: "member_added_to_squad"
  - event: "manual_trigger"

stages:
  - name: "Welcome & Introduction"
    description: "Boas-vindas e apresentação do squad"
    duration: "1 hour"
    tasks:
      - "Welcome email from squad lead"
      - "Add to squad Slack channel"
      - "Provide squad documentation (SQUADS.md)"
      - "Introduction to team members"

  - name: "Environment Setup"
    description: "Configuração do ambiente local"
    duration: "2-3 hours"
    tasks:
      - "Clone repository"
      - "npm install"
      - "npm run dev (verify)"
      - "npm run lint (verify)"
      - "npm run typecheck (verify)"
      - "Setup IDE extensions"
      - "Configure git hooks"

  - name: "Project Orientation"
    description: "Orientação sobre o projeto Beauty OS"
    duration: "3-4 hours"
    tasks:
      - "Read CLAUDE.md"
      - "Read GEMINI.md rules"
      - "Understand architecture (ARCHITECTURE.md)"
      - "Review squad responsibilities"
      - "Review tech stack"
      - "Review critical files"

  - name: "Squad-Specific Training"
    description: "Treinamento específico do squad"
    duration: "varies"
    tasks:
      - "Review squad YAML configuration"
      - "Understand squad responsibilities"
      - "Learn squad tools & workflow"
      - "Review active stories & tasks"
      - "Pair programming session (optional)"

  - name: "First Contribution"
    description: "Primeira contribuição ao squad"
    duration: "varies"
    tasks:
      - "Pick a small task from backlog"
      - "Create feature branch"
      - "Implement with pair/review"
      - "Create pull request"
      - "Get code review"
      - "Merge to main"

  - name: "Completion & Celebration"
    description: "Conclusão do onboarding"
    duration: "15 minutes"
    tasks:
      - "Update squad roster"
      - "Celebrate first contribution"
      - "Schedule sync meeting"
      - "Share helpful links (welcome document)"

approval_gates:
  - stage: "Environment Setup"
    requirement: "npm run dev works locally"

  - stage: "Project Orientation"
    requirement: "Understands CLAUDE.md & GEMINI.md"

  - stage: "First Contribution"
    requirement: "PR merged successfully"

success_criteria:
  - "Development environment is working"
  - "Team member understands project structure"
  - "Team member understands squad responsibilities"
  - "Team member made first contribution"
  - "Team member is added to all relevant channels"

resources:
  - "CLAUDE.md: Project instructions"
  - "GEMINI.md: AI behavior rules"
  - "SQUADS.md: Squad organization"
  - "ARCHITECTURE.md: System architecture"
  - "README.md: Project overview"
  - "Squad YAML: Squad configuration"

timeline:
  - "Day 1-2: Welcome & Environment Setup (4-5 hours)"
  - "Day 2-3: Project Orientation (3-4 hours)"
  - "Day 3-4: Squad Training (varies)"
  - "Day 4-5: First Contribution (varies)"
  - "Day 5: Completion (15 min)"

estimated_total: "2-3 weeks"

notes:
  - "Customize training based on squad specialization"
  - "Pair programming recommended for complex areas"
  - "Schedule sync meeting during first week"
  - "Document learnings for next onboarding"
