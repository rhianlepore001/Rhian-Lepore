### US-026: Fix RLS Bug in client_semantic_memory Table

story_id: US-026
epic: EPIC-003.1
title: "Fix RLS Bug in client_semantic_memory Table"
type: Bug / Security
priority: P0
status: TODO
owner: "@dev (for implementation) / @data-engineer (for DB review)"

description: >
  The client_semantic_memory table is missing user_id filter in RLS policy,
  allowing cross-tenant data leakage. Any authenticated user can read semantic
  memories of clients from other businesses. Fix requires RLS policy replacement
  with proper user_id via client_id join.

acceptance_criteria:
  - Policy updated: FROM "Allow authenticated" (permissive) TO "User isolation on client_semantic_memory"
  - RLS policy validates via EXISTS subquery on clients table
  - All client_semantic_memory records filtered by requesting user's ID
  - Existing data unaffected; only authorization changed
  - Migration created in supabase/migrations/ with descriptive name

scope:
  files_affected:
    - supabase/migrations/[next]_fix_rls_client_semantic_memory.sql
  test_coverage: >
    Test in Supabase that authenticated user A cannot read client memories
    of client owned by user B (RLS enforcement via JWT)
  risk: LOW (RLS only, no data modification)

estimation:
  t_shirt: XS
  hours: 0.5
  complexity: 1

dependencies:
  blocks: [ US-030 ]
  blocked_by: []

success_metric: >
  RLS policy enforced: SELECT from client_semantic_memory by user A restricted
  to clients owned by user A only. Verified via Supabase policy editor test.

