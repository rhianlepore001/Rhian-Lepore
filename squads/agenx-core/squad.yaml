squad:
  id: agenx-core-v1
  name: "AgenX Core Context Squad"
  description: >
    Squad de contexto fundamental do projeto AgenX/Beauty OS.
    Não executa features — fornece contexto técnico rico para todos os agentes
    que trabalham no projeto. Carregue este squad antes de qualquer story
    para garantir que @dev, @qa, @architect e @ux entendam os padrões,
    a arquitetura e as convenções do AgenX sem re-briefing.
  version: "1.0.0"
  domain: project-context
  created_at: "2026-03-08"
  status: active
  author: squad-creator-agent
  tags:
    - context
    - foundation
    - agenx
    - dual-theme
    - supabase
    - gemini

  # Como usar este squad:
  # Antes de iniciar qualquer story do AgenX, diga ao agente:
  # "Carregue o contexto do squad agenx-core antes de começar"
  # Os arquivos de config contêm toda a informação necessária.

  agents:
    - id: context-provider
      file: agents/context-provider.yaml

  tasks:
    - id: load-context
      file: tasks/load-context.md
    - id: validate-implementation
      file: tasks/validate-implementation.md

  checklists:
    - id: agenx-quality-gate
      file: checklists/agenx-quality-gate.md
    - id: dual-theme-checklist
      file: checklists/dual-theme-checklist.md

  config:
    tech-stack: config/tech-stack.md
    coding-standards: config/coding-standards.md
    source-tree: config/source-tree.md
    dual-theme-guide: config/dual-theme-guide.md

  data:
    - id: component-patterns
      file: data/component-patterns.md
    - id: supabase-patterns
      file: data/supabase-patterns.md
