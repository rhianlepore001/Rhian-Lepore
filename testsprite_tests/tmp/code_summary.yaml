version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React
  - Vite
  - Tailwind CSS
  - Supabase
  - Lucide-React
  - Recharts
  - React Router (HashRouter)
routes:
  - path: /#/login
    file: pages/Login.tsx
    auth_required: false
    description: Página de login com seleção de categoria (Barbeiro/Beleza)
  - path: /#/register
    file: pages/Register.tsx
    auth_required: false
    description: Página de registro de novo negócio
  - path: /#/forgot-password
    file: pages/ForgotPassword.tsx
    auth_required: false
    description: Recuperação de senha
  - path: /#/update-password
    file: pages/UpdatePassword.tsx
    auth_required: false
    description: Redefinição de senha via token
  - path: /#/
    file: pages/Dashboard.tsx
    auth_required: true
    description: Dashboard principal com métricas e KPIs
  - path: /#/agenda
    file: pages/Agenda.tsx
    auth_required: true
    description: Agenda de compromissos e calendário
  - path: /#/fila
    file: pages/QueueManagement.tsx
    auth_required: true
    description: Gerenciamento de fila digital (Dono)
  - path: /#/clientes
    file: pages/Clients.tsx
    auth_required: true
    description: Listagem e busca de clientes
  - path: /#/financeiro
    file: pages/Finance.tsx
    auth_required: true
    description: Gestão financeira e fluxo de caixa
  - path: /#/marketing
    file: pages/Marketing.tsx
    auth_required: true
    description: Copiloto de marketing e ações proativas
  - path: /#/insights
    file: pages/Reports.tsx
    auth_required: true
    description: Relatórios e análises gráficas
  - path: /#/book/:slug
    file: pages/PublicBooking.tsx
    auth_required: false
    description: Agendamento público para clientes
  - path: /#/queue/:slug
    file: pages/QueueJoin.tsx
    auth_required: false
    description: Entrada na fila digital por clientes
  - path: /#/queue-status/:id
    file: pages/QueueStatus.tsx
    auth_required: false
    description: Status da posição na fila para o cliente
features:
  - name: Autenticação
    description: Login, registro e recuperação de senha. Requer passar pelo gateway inicial.
    files:
      - pages/Login.tsx
      - pages/Register.tsx
      - contexts/AuthContext.tsx
    entry_route: /#/login
    user_interactions:
      - Navigate to /#/login
      - Wait until the text "BARBEARIA" is visible on the screen
      - Click on the button or card that contains the text "BARBEARIA" (this selects the theme and reveals the login form)
      - Wait for the email input field to be visible
      - Fill email with "rleporesilva@gmail.com"
      - Fill password with "rhianlepore789"
      - Click on the button with text "ENTRAR"
    auth_required: false
  - name: Dashboard
    description: Visualização de métricas de negócio
    files:
      - pages/Dashboard.tsx
    entry_route: /#/
    auth_required: true
known_limitations:
  - issue: HashRouter navigation
    location: App.tsx
    impact: Todas as rotas devem incluir "/#/" na URL (ex: /#/login)
  - issue: Gateway Selection
    location: pages/Login.tsx
    impact: Antes do login, é necessário selecionar uma categoria (Barbearia ou Salão) clicando no card correspondente.
