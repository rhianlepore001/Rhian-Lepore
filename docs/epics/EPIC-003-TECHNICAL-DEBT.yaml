### US-032: Fix N+1 Query Patterns in Dashboard, ClientCRM, Reports

story_id: US-032
epic: EPIC-003.2
title: "Eliminate N+1 Query Anti-patterns in Frontend"
type: Refactor / Performance
priority: P1
status: TODO
owner: "@dev (implementation) / @qa (performance testing)"

description: >
  Dashboard and ClientCRM execute loops fetching individual records instead of
  using JOINs. For 50 clients: 51 queries instead of 1. Fix by refactoring to
  Supabase select with relations or creating RPC with JOIN.

acceptance_criteria:
  - Dashboard.tsx: Refactored to fetch all data in 1-2 queries (was 3+)
  - ClientCRM.tsx: Refactored to fetch clients + related data in 1 query
  - Reports.tsx: Audited for N+1 patterns, refactored if found
  - All queries use select with embedded relations OR RPC with JOINs
  - No more for-loops with awaited queries inside

scope:
  files_affected:
    - pages/Dashboard.tsx
    - pages/ClientCRM.tsx
    - pages/Reports.tsx
    - Possibly: pages/Finance.tsx, pages/Agenda.tsx
  test_coverage: >
    Manually count queries (check Supabase logs or DevTools Network tab).
    Before: 50+ queries for 100 records. After: 1-2 queries.

estimation:
  t_shirt: M
  hours: 6-8
  complexity: 3

dependencies:
  blocks: [ US-035 ] # Caching layer needs N+1 fixed first
  blocked_by: [ US-031 ]

success_metric: >
  Supabase query count reduced 90%+ on affected pages. Dashboard still shows
  same data, but loads in ~1 second instead of 5+.

