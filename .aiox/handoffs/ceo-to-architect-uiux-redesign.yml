context: |
  O CEO (Cadu) recebeu um relatório completo de auditoria UI/UX do AgendiX e está delegando ao CTO (Aria) a definição da estratégia técnica e operacional de implementação.

task: |
  Definir plano estratégico completo para transformar o AgendiX em uma plataforma SaaS de experiência premium, baseado no relatório de auditoria UI/UX recebido.

  O plano deve incluir:
  1. Apetite de tempo (sprints, milestones)
  2. Alocação de agentes/sub-agentes por frente de trabalho
  3. Dependências e ordem de execução
  4. Critérios de aceitação técnicos
  5. Riscos e mitigações

  Frentes de trabalho (priorizadas no relatório):
  1. Refatoração do Design System (base para tudo)
  2. Redesenho do Dashboard
  3. Melhorias na Agenda
  4. Simplificação dos Ajustes
  5. Otimização do Agendamento Público (Booking)
  6. Módulo Financeiro

  Restrições:
  - Stack: React 19, TypeScript 5.8, Vite 6, Tailwind CSS, Supabase
  - Multi-tenant com RLS (company_id obrigatório em todo query)
  - Mobile first (barbeiros usam celular)
  - HashRouter com React.lazy() + Suspense
  - Não quebrar testes existentes

  O usuário quer "o mais rápido possível". Defina a velocidade máxima sustentável sem sacrificar qualidade.

audit_report_summary: |
  ## Relatório de Auditoria UI/UX - AgendiX

  ### Dashboard (Nota 6/10)
  - Cards de indicadores genéricos, sem gráficos de tendência
  - Onboarding intrusivo ocupa espaço vertical
  - Cores "lavadas" no modo claro
  - Recomendação: cards com radius 16px+, ícones lineares, mini-gráficos, tipografia refinada

  ### Agenda (Nota 5/10)
  - Grid denso, visual datado
  - Sem empty states elegantes
  - Recomendação: cards com glassmorphism sutil, avatares circulares, maior respiro

  ### Financeiro (Nota 5/10)
  - Tabelas genéricas, muitos botões "AJUDA"
  - Sem visualizações de dados (gráficos)
  - Recomendação: KPIs com indicadores de tendência, gráficos de barras/linhas/pizza, zebra-striping

  ### Ajustes (Nota 4/10)
  - Formulários longos, seletor de horários confuso
  - Upload de fotos confuso
  - Recomendação: cards temáticos, toggle switches, construtor de horários visual

  ### Booking Público (Nota 6/10)
  - Banner/logo não premium
  - Fluxo de chat pode ser lento
  - Recomendação: personalização de banner/logo, fluxo direto alternativo

  ### Design System Recomendado
  - Botões: estados completos, radius suave, sombras sutis
  - Inputs: bordas finas, foco claro
  - Cards: Standard, Elevated, Glassmorphic
  - Badges: semânticos, minimalistas
  - Tabelas: zebra-striping, hover states
  - Paleta: manter roxo/violeta como destaque
  - Tipografia: Inter, Satoshi, ou Geist

