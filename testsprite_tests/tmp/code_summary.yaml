version: "2"
type: frontend
tech_stack:
  - language: TypeScript 5.8
  - framework: React 19 + Vite 6 (HashRouter)
  - ui_library: Tailwind CSS (Brutal/Beauty themes)
  - other: Supabase Auth, Supabase DB (RLS), Google Gemini AI, Stripe, Recharts, Lucide React
routes:
  - path: /#/login
    file: pages/Login.tsx
    auth_required: false
    description: Login page with email and password
  - path: /#/register
    file: pages/Register.tsx
    auth_required: false
    description: New account registration for salon/barbershop owners
  - path: /#/forgot-password
    file: pages/ForgotPassword.tsx
    auth_required: false
    description: Request password reset email
  - path: /#/update-password
    file: pages/UpdatePassword.tsx
    auth_required: false
    description: Set new password after recovery email
  - path: /#/onboarding
    file: pages/OnboardingWizard.tsx
    auth_required: true
    description: Initial business setup wizard shown on first login
  - path: /#/
    file: pages/Dashboard.tsx
    auth_required: true
    description: Main dashboard with KPI cards and quick actions
  - path: /#/agenda
    file: pages/Agenda.tsx
    auth_required: true
    description: Appointment calendar with week/day/month views
  - path: /#/fila
    file: pages/QueueManagement.tsx
    auth_required: true
    description: Digital walk-in queue management (owner only)
  - path: /#/clientes
    file: pages/Clients.tsx
    auth_required: true
    description: Client list with search and filters
  - path: /#/clientes/:id
    file: pages/ClientCRM.tsx
    auth_required: true
    description: Individual client profile with appointment history
  - path: /#/financeiro
    file: pages/Finance.tsx
    auth_required: true
    description: Financial management with cashflow charts and transactions
  - path: /#/marketing
    file: pages/Marketing.tsx
    auth_required: true
    description: Marketing tools and opportunities (owner only)
  - path: /#/insights
    file: pages/Reports.tsx
    auth_required: true
    description: Business insights and analytics reports (owner only)
  - path: /#/configuracoes/geral
    file: pages/settings/GeneralSettings.tsx
    auth_required: true
    description: General business settings (name, hours, theme)
  - path: /#/configuracoes/agendamento
    file: pages/settings/PublicBookingSettings.tsx
    auth_required: true
    description: Public booking link settings
  - path: /#/configuracoes/equipe
    file: pages/settings/TeamSettings.tsx
    auth_required: true
    description: Team member management
  - path: /#/configuracoes/servicos
    file: pages/settings/ServiceSettings.tsx
    auth_required: true
    description: Services catalog management
  - path: /#/configuracoes/comissoes
    file: pages/settings/CommissionsSettings.tsx
    auth_required: true
    description: Staff commission rules and payouts
  - path: /#/configuracoes/assinatura
    file: pages/settings/SubscriptionSettings.tsx
    auth_required: true
    description: Subscription plan and Stripe billing
  - path: /#/configuracoes/auditoria
    file: pages/settings/AuditLogs.tsx
    auth_required: true
    description: Audit log viewer
  - path: /#/configuracoes/seguranca
    file: pages/settings/SecuritySettings.tsx
    auth_required: true
    description: Security settings and 2FA
  - path: /book/:slug
    file: pages/PublicBooking.tsx
    auth_required: false
    description: Public client-facing booking page (no login required)
  - path: /queue/:slug
    file: pages/QueueJoin.tsx
    auth_required: false
    description: Public queue join page for walk-in clients
  - path: /queue-status/:id
    file: pages/QueueStatus.tsx
    auth_required: false
    description: Real-time queue position status for clients
  - path: /pro/:slug
    file: pages/ProfessionalPortfolio.tsx
    auth_required: false
    description: Professional portfolio public page
features:
  - name: User Registration
    description: Owner creates a new salon/barbershop account with email and password
    files:
      - pages/Register.tsx
      - contexts/AuthContext.tsx
      - lib/supabase.ts
    entry_route: /#/register
    user_interactions:
      - Fill business name input
      - Fill email input
      - Fill password input
      - Fill confirm password input
      - Click Register button
      - See success message with email confirmation prompt
      - See inline error for already registered email
      - See validation error for mismatched passwords
    api_calls:
      - method: POST
        endpoint: supabase.auth.signUp
    auth_required: false

  - name: User Login
    description: Owner or staff logs into the application with email and password
    files:
      - pages/Login.tsx
      - contexts/AuthContext.tsx
      - lib/supabase.ts
    entry_route: /#/login
    user_interactions:
      - Fill email input
      - Fill password input
      - Click Login button
      - See error message on invalid credentials
      - Click Forgot password link to navigate to recovery
    api_calls:
      - method: POST
        endpoint: supabase.auth.signInWithPassword
    auth_required: false

  - name: Password Recovery
    description: User requests and completes password reset via email
    files:
      - pages/ForgotPassword.tsx
      - pages/UpdatePassword.tsx
    entry_route: /#/forgot-password
    user_interactions:
      - Fill email input on forgot-password page
      - Click send reset email button
      - See generic confirmation message
      - Open email link and land on update-password page
      - Fill new password
      - Fill confirm new password
      - Click update button
      - Redirect to login after success
      - See error when passwords do not match
    api_calls:
      - method: POST
        endpoint: supabase.auth.resetPasswordForEmail
      - method: POST
        endpoint: supabase.auth.updateUser
    auth_required: false

  - name: Onboarding Wizard
    description: First-time business setup wizard after registration
    files:
      - pages/OnboardingWizard.tsx
      - components/onboarding/StepSuccess.tsx
    entry_route: /#/onboarding
    user_interactions:
      - Fill business name on step 1
      - Fill address and contact info on step 2
      - Select theme (Brutal or Beauty) on step 3
      - Click Finish to complete onboarding
      - Redirect to dashboard after completion
      - See validation error if required business name is missing
    api_calls:
      - method: PATCH
        endpoint: supabase.from('companies').update
    auth_required: true

  - name: Dashboard KPIs
    description: Main overview with KPI cards for revenue, average ticket, and occupancy
    files:
      - pages/Dashboard.tsx
    entry_route: /#/
    user_interactions:
      - View revenue KPI card
      - View average ticket KPI card
      - View occupancy rate KPI card
      - Click KPI card to see detailed insights
      - Click refresh metrics button to update data
    api_calls:
      - method: GET
        endpoint: supabase.rpc('get_dashboard_stats')
    auth_required: true

  - name: Appointment Scheduling
    description: Create, view, edit, and delete appointments on the calendar
    files:
      - pages/Agenda.tsx
      - components/AppointmentEditModal.tsx
      - components/CalendarPicker.tsx
    entry_route: /#/agenda
    user_interactions:
      - View calendar in week view showing appointments by staff and time
      - Click time slot to create new appointment
      - Select service from dropdown
      - Select professional from dropdown
      - Select date and time
      - Save appointment
      - See new appointment appear on calendar
      - Click existing appointment to edit or delete
      - See conflict error when creating overlapping appointment
      - Mark appointment as completed
    api_calls:
      - method: GET
        endpoint: supabase.from('appointments').select
      - method: POST
        endpoint: supabase.from('appointments').insert
      - method: PATCH
        endpoint: supabase.from('appointments').update
      - method: DELETE
        endpoint: supabase.from('appointments').delete
    auth_required: true

  - name: Queue Management
    description: Digital walk-in queue for managing client flow in real time
    files:
      - pages/QueueManagement.tsx
    entry_route: /#/fila
    user_interactions:
      - View waiting clients list (Aguardando)
      - Add client to queue with name and service
      - Call next client to move from waiting to in-service
      - Mark client as completed
      - See validation error when required fields are missing
    api_calls:
      - method: GET
        endpoint: supabase.from('queue').select
      - method: POST
        endpoint: supabase.from('queue').insert
      - method: PATCH
        endpoint: supabase.from('queue').update
    auth_required: true

  - name: Client CRM
    description: Client list management and individual client profile view
    files:
      - pages/Clients.tsx
      - pages/ClientCRM.tsx
    entry_route: /#/clientes
    user_interactions:
      - View clients list
      - Search clients by name to filter the list
      - Select a client and confirm profile details render
      - View visit history on client profile
      - Add new client with name and contact
      - See validation error when contact is missing
    api_calls:
      - method: GET
        endpoint: supabase.from('clients').select
      - method: POST
        endpoint: supabase.from('clients').insert
    auth_required: true

  - name: Financial Management
    description: Cashflow charts and transaction ledger management
    files:
      - pages/Finance.tsx
    entry_route: /#/financeiro
    user_interactions:
      - View daily cashflow chart
      - View monthly cashflow chart
      - Select specific date to see that day's transactions
      - Add income transaction and verify it appears in ledger
      - See validation error when amount field is empty
    api_calls:
      - method: GET
        endpoint: supabase.from('transactions').select
      - method: POST
        endpoint: supabase.from('transactions').insert
    auth_required: true

  - name: Public Booking
    description: Client books an appointment without logging in via public link
    files:
      - pages/PublicBooking.tsx
    entry_route: /book/:slug
    user_interactions:
      - Select service from list
      - Select professional
      - Select available date and time slot
      - Fill name and phone number
      - Confirm booking
      - See success confirmation
    api_calls:
      - method: GET
        endpoint: supabase.from('companies').select
      - method: POST
        endpoint: supabase.from('appointments').insert
    auth_required: false

  - name: Queue Join (Public)
    description: Walk-in client joins the digital queue via public link
    files:
      - pages/QueueJoin.tsx
    entry_route: /queue/:slug
    user_interactions:
      - Fill name field
      - Fill phone field
      - Select service
      - Click join queue button
      - Receive queue status link on success
      - See validation error when required fields are missing
      - See error when queue is closed or full
    api_calls:
      - method: GET
        endpoint: supabase.from('companies').select
      - method: POST
        endpoint: supabase.from('queue').insert
    auth_required: false

  - name: Queue Status (Public)
    description: Client monitors real-time queue position after joining
    files:
      - pages/QueueStatus.tsx
    entry_route: /queue-status/:id
    user_interactions:
      - View current queue position number
      - View estimated wait time
      - See real-time updates when position changes
      - See "Now serving" state when at the front
      - See error message on invalid queue link
    api_calls:
      - method: GET
        endpoint: supabase.from('queue').select
    auth_required: false

  - name: Reports and Insights
    description: Business analytics with revenue and occupancy charts
    files:
      - pages/Reports.tsx
    entry_route: /#/insights
    user_interactions:
      - View revenue chart
      - View occupancy chart
      - Change timeframe filter and verify charts update
      - Export report and see format options
      - See empty state message when no data in selected period
    api_calls:
      - method: GET
        endpoint: supabase.rpc('get_insights')
    auth_required: true

  - name: Team and Services Management
    description: CRUD operations for team members and service catalog
    files:
      - pages/settings/TeamSettings.tsx
      - pages/settings/ServiceSettings.tsx
      - components/TeamMemberCard.tsx
      - components/ServiceModal.tsx
    entry_route: /#/configuracoes/equipe
    user_interactions:
      - View team members list
      - Add new team member
      - Edit existing team member
      - Remove team member
      - Navigate to services settings
      - Add new service with name, price and duration
      - Edit existing service
      - Delete service
    api_calls:
      - method: GET
        endpoint: supabase.from('users').select
      - method: POST
        endpoint: supabase.from('users').insert
      - method: PATCH
        endpoint: supabase.from('users').update
      - method: DELETE
        endpoint: supabase.from('users').delete
      - method: GET
        endpoint: supabase.from('services').select
      - method: POST
        endpoint: supabase.from('services').insert
      - method: PATCH
        endpoint: supabase.from('services').update
      - method: DELETE
        endpoint: supabase.from('services').delete
    auth_required: true

known_limitations:
  - issue: App uses HashRouter so all internal routes are prefixed with /#/
    location: App.tsx
    impact: URL structure is /#/login, /#/agenda etc not standard paths
  - issue: Onboarding wizard must be completed before accessing any protected route
    location: App.tsx (ProtectedLayout)
    impact: Tests for protected routes require a pre-configured account with tutorialCompleted=true
  - issue: RLS enforces company_id isolation at database level
    location: lib/supabase.ts
    impact: Test data must belong to the same company as the authenticated test user
  - issue: Marketing page was simplified to single Opportunities tab
    location: pages/Marketing.tsx
    impact: Campaign history, photo studio, and WhatsApp campaign features are no longer available
