    rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            // Theme colors: canonical hex lives in /design-system/tokens.css.
            // Keep obsidian/silk/brutal keys for legacy Tailwind classes; gold/violet/neutral
            // duplicates below reference token primitives instead of repeating hex.
            obsidian: {
              bg: '#12100E',
              card: '#1A1816',
              border: 'rgba(255, 245, 230, 0.08)',
              accent: '#C29B40',
              surface: '#21201C',
            },
            silk: {
              bg: '#E2E1DA',
              card: '#FFFFFF',
              border: '#CAC9BF',
              accent: '#1D1D1F',
              surface: '#F5F4F0',
              'bg': '#E2E1DA',
              'accent': '#1D1D1F',
              'border': '#CAC9BF',
              'surface': '#F5F4F0',
            },
            brutal: {
              main: '#121212',
              card: '#1E1E1E',
              border: '#000000',
              surface: '#252525'
            },
            accent: {
              gold: '#C9A24A',
              goldHover: '#DFC066',
              goldDim: '#8A6D2A',
            },
            beauty: {
              neon: '#A78BFA',
              neonHover: '#C4B5FD',
              acid: '#8B5CF6',
              silver: '#E9D5FF',
              dark: '#17132A',
              card: '#221F35',
            },
            text: {
              primary: '#EAEAEA',
              secondary: '#A0A0A0',
              muted: '#525252'
            },
            theme: {
              bg: 'var(--color-bg)',
              card: 'var(--color-card)',
              surface: 'var(--color-surface)',
              accent: 'var(--color-accent)',
              accentHover: 'var(--color-accent-hover)',
              text: 'var(--color-text)',
              textSecondary: 'var(--color-text-secondary)',
              border: 'var(--color-border)',
              input: 'var(--color-input-bg)',
            }
          },
          fontFamily: {
            heading: ['"Chivo"', 'sans-serif'],
            display: ['"Chivo"', 'sans-serif'], // High impact
            body: ['"Inter"', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          boxShadow: {
            'heavy': '4px 4px 0px 0px #000000',
            'heavy-sm': '2px 2px 0px 0px #000000',
            'heavy-lg': '8px 8px 0px 0px #000000',
            'inner-heavy': 'inset 0 0 20px rgba(0,0,0,0.8)',
            'neon': '0 0 10px rgba(183, 148, 246, 0.5), 0 0 20px rgba(183, 148, 246, 0.3)',
            'neon-strong': '0 16px 36px -12px rgba(0,0,0,0.6), 0 8px 16px -8px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(167, 139, 250, 0.15)',
            'soft': '0 10px 30px -10px rgba(0, 0, 0, 0.5)',
            'soft-lg': '0 20px 40px -15px rgba(0, 0, 0, 0.6)',
            'gold': '0 0 10px rgba(194, 155, 64, 0.4), 0 0 20px rgba(194, 155, 64, 0.2)',
            'promax-glass': '0 12px 40px -12px rgba(0, 0, 0, 0.7), inset 0 0 0 1px rgba(255, 245, 230, 0.12)',
            'promax-depth': '0 16px 36px -12px rgba(0,0,0,0.6), 0 8px 16px -8px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(194, 155, 64, 0.15)',
            'silk-shadow': '0 10px 30px -10px rgba(0, 0, 0, 0.15), 0 4px 12px rgba(0, 0, 0, 0.05)',
            'silk-glow': '0 0 20px rgba(212, 175, 55, 0.1)',
            // Lite versions for mobile performance
            'lite-glass': '0 4px 12px rgba(0, 0, 0, 0.5)',
            'lite-gold': '0 4px 12px rgba(194, 155, 64, 0.2)',
          },
          backgroundImage: {
            'noise': "url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMDAiIGhlaWdodD0iMjAwIj48ZmlsdGVyIGlkPSJub2lzZUZpbHRlciI+PGZlVHVyYnVsZW5jZSB0eXBlPSJmcmFjdGFsTm9pc2UiIGJhc2VGcmVxdWVuY3k9IjAuNjUiIG51bU9jdGF2ZXM9IjMiIHN0aXRjaFRpbGVzPSJzdGl0Y2giLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWx0ZXI9InVybCgjbm9pc2VGaWx0ZXIpIiBvcGFjaXR5PSIwLjA1Ii8+PC9zdmc+')",
            'gradient-beauty': 'linear-gradient(135deg, #17132A 0%, #221F35 50%, #17132A 100%)',
            'gradient-brutal': 'linear-gradient(135deg, #12100E 0%, #1A1816 50%, #12100E 100%)',
            'gradient-promax': 'linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%)',
            'gradient-obsidian': 'linear-gradient(180deg, #12100E 0%, #1A1816 100%)',
            'gradient-silk-premium': 'linear-gradient(135deg, #F5F5F1 0%, #FAF9F6 100%)',
          },
          animation: {
            'fade-in': 'fadeIn 0.3s ease-out',
            'reveal-fragment': 'revealFragment 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'slide-up': 'slideUp 0.3s ease-out',
            'slide-down': 'slideDown 0.3s ease-out',
            'scale-in': 'scaleIn 0.2s ease-out',
            'pulse-neon': 'pulseNeon 2s ease-in-out infinite',
            'shimmer': 'shimmer 2s linear infinite',
            'haptic-click': 'hapticClick 0.15s cubic-bezier(0.4, 0, 0.2, 1)',
            'shine': 'shine 1.5s ease-in-out infinite',
            'flow-slow': 'flow 3s linear infinite',
            // Wizard onboarding animations
            'wizard-pointer-bounce': 'wizardPointerBounce 1s ease-in-out infinite',
            'wizard-pointer-bounce-x': 'wizardPointerBounceX 1s ease-in-out infinite',
            'wizard-pulse': 'wizardPulse 1.5s ease-in-out infinite',
            'wizard-fade-in': 'wizardFadeIn 0.3s ease-out',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            revealFragment: {
              '0%': { opacity: '0', transform: 'translateY(20px) scale(0.98)' },
              '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
            },
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            slideDown: {
              '0%': { opacity: '0', transform: 'translateY(-10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            scaleIn: {
              '0%': { opacity: '0', transform: 'scale(0.95)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            },
            pulseNeon: {
              '0%, 100%': { boxShadow: '0 0 10px rgba(167, 139, 250, 0.5), 0 0 20px rgba(167, 139, 250, 0.3)' },
              '50%': { boxShadow: '0 0 20px rgba(167, 139, 250, 0.7), 0 0 40px rgba(167, 139, 250, 0.5)' },
            },
            shimmer: {
              '0%': { backgroundPosition: '-200% 0' },
              '100%': { backgroundPosition: '200% 0' },
            },
            hapticClick: {
              '0%, 100%': { transform: 'scale(1)' },
              '50%': { transform: 'scale(0.92)' },
            },
            flow: {
              '0%': { strokeDashoffset: '24' },
              '100%': { strokeDashoffset: '0' },
            },
            // Wizard onboarding keyframes
            wizardPointerBounce: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-8px)' },
            },
            wizardPointerBounceX: {
              '0%, 100%': { transform: 'translateX(0)' },
              '50%': { transform: 'translateX(-8px)' },
            },
            wizardPulse: {
              '0%, 100%': { opacity: '1', transform: 'scale(1)' },
              '50%': { opacity: '0.5', transform: 'scale(1.3)' },
            },
            wizardFadeIn: {
              '0%': { opacity: '0', transform: 'scale(0.95)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            },
          },
          dropShadow: {
            'glow': '0 0 8px rgba(255, 255, 255, 0.4)',
            'gold': '0 0 12px rgba(194, 155, 64, 0.3)',
          }
        }
      }
    }
  </script>
  <style>
    /* Global iOS Optimizations */
    * {
      touch-action: manipulation;
      /* Remove 300ms delay globally */
      -webkit-tap-highlight-color: transparent;
      /* Remove gray highlight */
    }

    html {
      background-color: var(--color-bg, #050505);
      transition: background-color 0.4s ease;
    }

    body {
      background: var(--bg-gradient, #050505);
      background-color: var(--color-bg, #050505);
      color: var(--color-text, #EAEAEA);
      font-family: 'Inter', sans-serif;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: none;
      position: relative;
      transition: background-color 0.4s ease, color 0.4s ease;
    }

    /* ========================================================
       THEME OVERRIDES BRIDGE (DUAL MODE)
       Mapeia classes hardcoded de "Dark Mode" para as cores
       "Light Mode" quando o data-mode="light" está ativo.
       Evita refatorar 50+ arquivos.
       ======================================================== */
    html[data-mode="light"] .text-white { color: var(--color-text) !important; }
    html[data-mode="light"] .text-neutral-400 { color: var(--color-text-muted) !important; }
    html[data-mode="light"] .text-neutral-300 { color: var(--color-text) !important; }
    html[data-mode="light"] .text-neutral-500 { color: rgba(0,0,0,0.4) !important; }
    
    html[data-mode="light"] .border-neutral-800,
    html[data-mode="light"] .border-neutral-700,
    html[data-mode="light"] .border-white\\/10,
    html[data-mode="light"] .border-white\\/5 {
      border-color: rgba(0, 0, 0, 0.08) !important;
    }

    /* Cards e Superfícies Gerais */
    html[data-mode="light"] .bg-neutral-900,
    html[data-mode="light"] .bg-neutral-800 {
      background-color: var(--color-card) !important;
    }
    
    html[data-mode="light"] .hover\\:bg-neutral-800:hover,
    html[data-mode="light"] .hover\\:bg-white\\/5:hover,
    html[data-mode="light"] .hover\\:bg-white\\/10:hover {
      background-color: rgba(0,0,0,0.05) !important;
    }

    /* Específicos Barber (obsidian + legacy brutal) */
    html[data-mode="light"][data-theme="barber"] .bg-brutal-card,
    html[data-mode="light"][data-theme="barber"] .bg-brutal-main,
    html[data-mode="light"][data-theme="barber"] .bg-obsidian-bg,
    html[data-mode="light"][data-theme="barber"] .bg-obsidian-card,
    html[data-mode="light"][data-theme="barber"] .bg-obsidian-surface {
      background-color: var(--color-card) !important;
    }

    /* Específicos Beauty */
    html[data-mode="light"][data-theme="beauty"] .bg-beauty-card,
    html[data-mode="light"][data-theme="beauty"] .bg-beauty-dark {
      background-color: var(--color-card) !important;
    }
    
    /* Inputs */
    html[data-mode="light"] input.bg-neutral-800,
    html[data-mode="light"] select.bg-neutral-800,
    html[data-mode="light"] textarea.bg-neutral-800,
    html[data-mode="light"] .bg-black\\/20 {
      background-color: var(--color-bg) !important;
      border-color: rgba(0,0,0,0.1) !important;
      color: var(--color-text) !important;
    }

    /* Ajuste de placehoder para inputs light */
    html[data-mode="light"] input::placeholder,
    html[data-mode="light"] textarea::placeholder {
      color: var(--color-text-muted) !important;
    }

    /* ====== BRIDGE ESTENDIDA — fase 2 (cobre cores não mapeadas) ====== */

    /* Pretos chapados → superfície de card */
    html[data-mode="light"] .bg-black,
    html[data-mode="light"] .bg-neutral-950 {
      background-color: var(--color-card) !important;
    }

    /* Classes customizadas de tema (beauty-dark, brutal-main, etc) → overlay/card no light */
    html[data-mode="light"] .bg-beauty-dark,
    html[data-mode="light"] .bg-beauty-dark\/5,
    html[data-mode="light"] .bg-beauty-dark\/10,
    html[data-mode="light"] .bg-beauty-dark\/20,
    html[data-mode="light"] .bg-beauty-dark\/30,
    html[data-mode="light"] .bg-beauty-dark\/40,
    html[data-mode="light"] .bg-beauty-dark\/50,
    html[data-mode="light"] .bg-beauty-dark\/60,
    html[data-mode="light"] .bg-beauty-dark\/70,
    html[data-mode="light"] .bg-beauty-dark\/80,
    html[data-mode="light"] .bg-beauty-dark\/90,
    html[data-mode="light"] .bg-beauty-dark\/95,
    html[data-mode="light"] .bg-brutal-main,
    html[data-mode="light"] .bg-brutal-main\/5,
    html[data-mode="light"] .bg-brutal-main\/10,
    html[data-mode="light"] .bg-brutal-main\/20,
    html[data-mode="light"] .bg-brutal-main\/30,
    html[data-mode="light"] .bg-brutal-main\/40,
    html[data-mode="light"] .bg-brutal-main\/50,
    html[data-mode="light"] .bg-brutal-main\/60,
    html[data-mode="light"] .bg-brutal-main\/70,
    html[data-mode="light"] .bg-brutal-main\/80,
    html[data-mode="light"] .bg-brutal-main\/90,
    html[data-mode="light"] .bg-brutal-card,
    html[data-mode="light"] .bg-obsidian-bg,
    html[data-mode="light"] .bg-obsidian-card,
    html[data-mode="light"] .bg-obsidian-surface {
      background-color: var(--color-overlay) !important;
    }

    /* Pretos translúcidos → tinta sutil */
    html[data-mode="light"] .bg-black\/10,
    html[data-mode="light"] .bg-black\/20,
    html[data-mode="light"] .bg-black\/30,
    html[data-mode="light"] .bg-black\/40,
    html[data-mode="light"] .bg-black\/50,
    html[data-mode="light"] .bg-black\/60,
    html[data-mode="light"] .bg-black\/70,
    html[data-mode="light"] .bg-black\/80,
    html[data-mode="light"] .bg-black\/85,
    html[data-mode="light"] .bg-black\/90 {
      background-color: var(--color-overlay) !important;
    }

    /* Paleta antiga stone/zinc → mesmas regras */
    html[data-mode="light"] .bg-stone-900,
    html[data-mode="light"] .bg-stone-800,
    html[data-mode="light"] .bg-stone-950,
    html[data-mode="light"] .bg-zinc-900,
    html[data-mode="light"] .bg-zinc-800,
    html[data-mode="light"] .bg-zinc-950 {
      background-color: var(--color-card) !important;
    }

    /* Hover states adicionais */
    html[data-mode="light"] .hover\:bg-black\/5:hover,
    html[data-mode="light"] .hover\:bg-black\/10:hover,
    html[data-mode="light"] .hover\:bg-neutral-900:hover,
    html[data-mode="light"] .hover\:bg-neutral-700:hover,
    html[data-mode="light"] .hover\:bg-stone-900:hover,
    html[data-mode="light"] .hover\:bg-zinc-900:hover {
      background-color: var(--color-card-hover) !important;
    }

    /* Bordas pretas/escuras → divisor */
    html[data-mode="light"] .border-black,
    html[data-mode="light"] .border-black\/10,
    html[data-mode="light"] .border-black\/20,
    html[data-mode="light"] .border-stone-800,
    html[data-mode="light"] .border-stone-900,
    html[data-mode="light"] .border-zinc-800,
    html[data-mode="light"] .border-zinc-900,
    html[data-mode="light"] .border-neutral-900,
    html[data-mode="light"] .border-neutral-950 {
      border-color: var(--color-divider) !important;
    }

    /* Texto claro sobre superfícies escuras → texto principal escuro no light */
    html[data-mode="light"] .text-neutral-100,
    html[data-mode="light"] .text-neutral-200,
    html[data-mode="light"] .text-stone-100,
    html[data-mode="light"] .text-stone-200,
    html[data-mode="light"] .text-zinc-100,
    html[data-mode="light"] .text-zinc-200 {
      color: var(--color-text) !important;
    }

    /* Cards elevados (cards dentro de cards) */
    html[data-mode="light"] .bg-brutal-card-elevated,
    html[data-mode="light"] .bg-beauty-elevated {
      background-color: var(--color-card-elevated) !important;
    }

    /* Ringa de foco escuras → accent translúcido */
    html[data-mode="light"] .ring-white\/10,
    html[data-mode="light"] .ring-white\/5,
    html[data-mode="light"] .ring-black\/10 {
      --tw-ring-color: var(--color-divider) !important;
    }

    /* Gradientes "from-black", "from-neutral-9*" — neutralizar para card */
    html[data-mode="light"] .from-black,
    html[data-mode="light"] .from-neutral-900,
    html[data-mode="light"] .from-neutral-950,
    html[data-mode="light"] .from-stone-900,
    html[data-mode="light"] .from-zinc-900 {
      --tw-gradient-from: var(--color-card) var(--tw-gradient-from-position) !important;
      --tw-gradient-to: rgb(255 255 255 / 0) var(--tw-gradient-to-position) !important;
      --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to) !important;
    }

    html[data-mode="light"] .to-black,
    html[data-mode="light"] .to-neutral-900,
    html[data-mode="light"] .to-neutral-950,
    html[data-mode="light"] .to-stone-900,
    html[data-mode="light"] .to-zinc-900 {
      --tw-gradient-to: var(--color-card) var(--tw-gradient-to-position) !important;
    }

    /* Previne flash branco/escuro na rota pública — aplicado ANTES do React montar */
    html[data-public-theme="obsidian"] body,
    html[data-public-theme="obsidian"] {
      background-color: #12100E !important;
    }

    html[data-public-theme="silk"] body,
    html[data-public-theme="silk"] {
      background-color: #E2E1DA !important;
      color: #1D1D1F !important;
    }

    /* Classes aplicadas via JS no useEffect do PublicBooking */
    body.public-booking-root {
      background-color: #12100E;
    }

    body.public-booking-root.beauty-theme {
      background-color: #E2E1DA !important;
      color: #1D1D1F !important;
    }

    /* Theming Variables (Dual Mode) */
    :root, html[data-theme="barber"][data-mode="dark"] {
      --color-bg: #12100E;
      --color-card: #1A1816;
      --color-card-elevated: #21201C;
      --color-card-hover: rgba(255, 255, 255, 0.04);
      --color-surface: #21201C;
      --color-divider: rgba(255, 255, 255, 0.08);
      --color-overlay: rgba(0, 0, 0, 0.72);
      --color-accent: #C9A24A;
      --color-accent-hover: #DFC066;
      --color-modal-bg: #201D1A;
      --color-modal-border: rgba(201, 162, 74, 0.15);
      --color-text: #F0EBE0;
      --color-text-muted: #6B6252;
      --color-text-secondary: #A89A82;
      --color-border: rgba(255, 245, 230, 0.08);
      --color-input-bg: rgba(20, 16, 10, 0.5);
      --color-focus-ring: rgba(201, 162, 74, 0.25);
      --shadow-brutal: 8px 8px 0 0 #000000;
      --shadow-brutal-sm: 2px 2px 0 0 #000000;
      --shadow-brutal-md: 4px 4px 0 0 #000000;
      --bg-gradient: radial-gradient(circle at 10% 90%, rgba(194, 155, 64, 0.08) 0%, transparent 50%),
                     radial-gradient(circle at 90% 10%, rgba(194, 155, 64, 0.05) 0%, transparent 40%),
                     var(--color-bg);
      --particle-color: rgba(194, 155, 64, 0.20);
    }

    html[data-theme="barber"][data-mode="light"] {
      --color-bg: #E5E5E5;
      --color-card: #FFFFFF;
      --color-card-elevated: #F4F4F4;
      --color-card-hover: rgba(0, 0, 0, 0.05);
      --color-surface: #D8D8D8;
      --color-divider: rgba(0, 0, 0, 0.10);
      --color-overlay: rgba(20, 20, 20, 0.55);
      --color-accent: #8B6914;
      --color-accent-hover: #A07A2A;
      --color-modal-bg: #FFFFFF;
      --color-modal-border: rgba(0, 0, 0, 0.08);
      --color-text: #1A1610;
      --color-text-muted: #7A7A75;
      --color-text-secondary: #55524C;
      --color-border: rgba(0, 0, 0, 0.10);
      --color-input-bg: rgba(0, 0, 0, 0.04);
      --color-focus-ring: rgba(139, 105, 20, 0.45);
      --shadow-brutal: 6px 6px 0 0 rgba(139, 105, 20, 0.30);
      --shadow-brutal-sm: 2px 2px 0 0 rgba(139, 105, 20, 0.22);
      --shadow-brutal-md: 4px 4px 0 0 rgba(139, 105, 20, 0.26);

  <!-- Anti-FOUC: aplica data-mode ANTES do React montar para evitar flash de cor errada -->
  <script>

      var mode = localStorage.getItem('agendix_color_mode') || 'dark';

  <!-- Detecção antecipada da rota de agendamento público: previne flash de fundo errado -->
  <script>
      (function () {
        var hash = window.location.hash;
        // Rotas públicas usam HashRouter: #/book/, #/queue/, #/pro/, #/minha-area/
        if (/^#\/(book|queue|queue-status|pro|minha-area)\//.test(hash)) {
          document.documentElement.setAttribute('data-public-theme', 'obsidian');
          document.documentElement.style.backgroundColor = '#12100E';
          document.body && (document.body.style.backgroundColor = '#12100E');
          // Em rotas públicas, não aplicar data-mode do usuário
          document.documentElement.removeAttribute('data-mode');
        }
      })();
  </script>
